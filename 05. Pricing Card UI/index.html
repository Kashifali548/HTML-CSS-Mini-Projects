<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Pricing Card UI</title>
  </head>
  <body>
    <h1>Pricing Plans</h1>

    <div class="pricing-container">
      
        <div class="card">
        <h2>Basic</h2>
        <p class="price">$9/mo</p>
        <ul>
          <li>5 Projects</li>
          <li>10 GB Storage</li>
          <li>Email Support</li>
        </ul>
        <button>Buy Now</button>
      </div>

      <div class="card">
        <h2>Pro</h2>
        <p class="price">$29/mo</p>
        <ul>
          <li>20 Projects</li>
          <li>50 GB Storage</li>
          <li>Priority Support</li>
        </ul>
        <button>Buy Now</button>
      </div>

      <div class="card">
        <h2>Premium</h2>
        <p class="price">$49/mo</p>
        <ul>
          <li>Unlimited Projects</li>
          <li>200 GB Storage</li>
          <li>24/7 Support</li>
        </ul>
        <button>Buy Now</button>
      </div>
   
    </div>
  </body>
</html>
