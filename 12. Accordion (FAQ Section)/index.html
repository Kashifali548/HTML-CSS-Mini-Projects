<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>ccordion (FAQ Section)</title>
  </head>
  <body>
    
    <h1>FAQ Section</h1>

    <div class="accordion">
      <div class="item">
        <input type="checkbox" id="q1" />
        <label for="q1">What is CSS?</label>
        <div class="content">
          <p>CSS is used to style and design web pages.</p>
        </div>
      </div>

      <div class="item">
        <input type="checkbox" id="q2" />
        <label for="q2">What is Flexbox?</label>
        <div class="content">
          <p>Flexbox is used to align items in rows or columns.</p>
        </div>
      </div>

      <div class="item">
        <input type="checkbox" id="q3" />
        <label for="q3">What is Grid?</label>
        <div class="content">
          <p>Grid is used for creating complex layouts.</p>
        </div>
      </div>
    </div>
    
  </body>
</html>
