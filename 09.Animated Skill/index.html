<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Skill Bars</title>
  </head>
 <body>
   
    <h1>My Skills</h1>

    <div class="skill">
      <p>HTML</p>
      <div class="bar">
        <div class="progress html"></div>
      </div>
    </div>

    <div class="skill">
      <p>CSS</p>
      <div class="bar">
        <div class="progress css"></div>
      </div>
    </div>

    <div class="skill">
      <p>JavaScript</p>
      <div class="bar">
        <div class="progress js"></div>
      </div>
    </div>

 </body>
</html>
